<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Progress Room - Vibrant Habit-Builder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#fb5151",
              "background-light": "#f8f5f5",
              "background-dark": "#230f0f",
              "text-main": "#2B2D42",
              "accent-streak": "#F9C74F",
            },
            fontFamily: {
              "display": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            boxShadow: {
              'block': '4px 4px 0px 0px #2B2D42',
              'block-sm': '2px 2px 0px 0px #2B2D42',
              'glow': '0 0 15px rgba(251, 81, 81, 0.4)',
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f8f5f5;
        }
        .border-thick {
            border: 2px solid #2B2D42;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-main min-h-screen flex flex-col items-center">
<div class="w-full max-w-[448px] bg-background-light dark:bg-background-dark min-h-screen flex flex-col relative pb-20">
<!-- Header -->
<div class="flex items-center justify-between p-6">
<h1 class="text-2xl font-bold tracking-tight">Progress Room</h1>
<button class="w-10 h-10 rounded-full border-thick bg-white shadow-block-sm flex items-center justify-center">
<span class="material-symbols-outlined text-text-main">share</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 space-y-8">
<!-- Hero Streak -->
<div class="flex flex-col items-center justify-center mt-4">
<div class="relative w-[200px] h-[200px] flex items-center justify-center">
<!-- Background Ring -->
<svg class="w-full h-full absolute top-0 left-0 transform -rotate-90" viewbox="0 0 100 100">
<circle class="dark:stroke-gray-700" cx="50" cy="50" fill="none" r="45" stroke="#e2dada" stroke-width="8"></circle>
<!-- Progress Ring (Approx 75% complete) -->
<circle cx="50" cy="50" fill="none" r="45" stroke="#fb5151" stroke-dasharray="283" stroke-dashoffset="70" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="flex flex-col items-center z-10">
<span class="material-symbols-outlined text-accent-streak text-4xl mb-[-8px]">local_fire_department</span>
<span class="text-6xl font-bold text-text-main dark:text-white leading-none">12</span>
<span class="text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mt-1">Day Streak</span>
</div>
</div>
</div>
<!-- Weekly Chart -->
<div class="bg-white dark:bg-gray-800 rounded-xl border-thick shadow-block p-5">
<div class="flex justify-between items-end mb-4">
<h2 class="text-lg font-bold">This Week</h2>
<span class="text-sm font-bold text-primary">28/35 Prayers</span>
</div>
<div class="flex justify-between items-end h-32 gap-2">
<!-- Monday -->
<div class="flex flex-col items-center gap-2 flex-1">
<div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-full relative flex items-end justify-center overflow-hidden border-thick border-gray-200 dark:border-gray-600">
<div class="w-full bg-primary rounded-full" style="height: 100%;"></div>
</div>
<span class="text-xs font-bold text-gray-500">M</span>
</div>
<!-- Tuesday -->
<div class="flex flex-col items-center gap-2 flex-1">
<div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-full relative flex items-end justify-center overflow-hidden border-thick border-gray-200 dark:border-gray-600">
<div class="w-full bg-primary rounded-full" style="height: 80%;"></div>
</div>
<span class="text-xs font-bold text-gray-500">T</span>
</div>
<!-- Wednesday -->
<div class="flex flex-col items-center gap-2 flex-1">
<div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-full relative flex items-end justify-center overflow-hidden border-thick border-gray-200 dark:border-gray-600">
<div class="w-full bg-primary rounded-full" style="height: 100%;"></div>
</div>
<span class="text-xs font-bold text-gray-500">W</span>
</div>
<!-- Thursday -->
<div class="flex flex-col items-center gap-2 flex-1">
<div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-full relative flex items-end justify-center overflow-hidden border-thick border-gray-200 dark:border-gray-600">
<div class="w-full bg-primary rounded-full" style="height: 60%;"></div>
</div>
<span class="text-xs font-bold text-gray-500">T</span>
</div>
<!-- Friday -->
<div class="flex flex-col items-center gap-2 flex-1">
<div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-full relative flex items-end justify-center overflow-hidden border-thick border-gray-200 dark:border-gray-600">
<div class="w-full bg-primary rounded-full" style="height: 100%;"></div>
</div>
<span class="text-xs font-bold text-gray-500">F</span>
</div>
<!-- Saturday -->
<div class="flex flex-col items-center gap-2 flex-1">
<div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-full relative flex items-end justify-center overflow-hidden border-thick border-gray-200 dark:border-gray-600">
<div class="w-full bg-primary rounded-full" style="height: 100%;"></div>
</div>
<span class="text-xs font-bold text-gray-500">S</span>
</div>
<!-- Sunday (Today - partial) -->
<div class="flex flex-col items-center gap-2 flex-1">
<div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-full relative flex items-end justify-center overflow-hidden border-thick border-gray-200 dark:border-gray-600">
<div class="w-full bg-accent-streak rounded-full" style="height: 40%;"></div>
</div>
<span class="text-xs font-bold text-text-main dark:text-white">S</span>
</div>
</div>
</div>
<!-- Badges Section -->
<div>
<h2 class="text-xl font-bold mb-4">Badges</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Unlocked Badge 1 -->
<div class="aspect-square bg-white dark:bg-gray-800 rounded-xl border-thick shadow-block flex flex-col items-center justify-center p-4 relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-16 h-16 rounded-full bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center mb-3 shadow-glow">
<span class="material-symbols-outlined text-4xl text-accent-streak">wb_sunny</span>
</div>
<span class="text-sm font-bold text-center leading-tight">Early Bird</span>
</div>
<!-- Unlocked Badge 2 -->
<div class="aspect-square bg-white dark:bg-gray-800 rounded-xl border-thick shadow-block flex flex-col items-center justify-center p-4 relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-16 h-16 rounded-full bg-teal-100 dark:bg-teal-900/30 flex items-center justify-center mb-3 shadow-glow">
<span class="material-symbols-outlined text-4xl text-[#4ECDC4]">groups</span>
</div>
<span class="text-sm font-bold text-center leading-tight">Congregation<br/>Captain</span>
</div>
<!-- Locked Badge 1 -->
<div class="aspect-square bg-gray-200 dark:bg-gray-800 rounded-xl border-thick border-gray-400 dark:border-gray-600 flex flex-col items-center justify-center p-4 opacity-60 grayscale relative cursor-not-allowed">
<div class="absolute top-2 right-2">
<span class="material-symbols-outlined text-gray-500 text-sm">lock</span>
</div>
<div class="w-16 h-16 rounded-full bg-gray-300 dark:bg-gray-700 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-4xl text-gray-500">calendar_month</span>
</div>
<span class="text-sm font-bold text-center leading-tight text-gray-600 dark:text-gray-400">Perfect Month</span>
</div>
<!-- Locked Badge 2 -->
<div class="aspect-square bg-gray-200 dark:bg-gray-800 rounded-xl border-thick border-gray-400 dark:border-gray-600 flex flex-col items-center justify-center p-4 opacity-60 grayscale relative cursor-not-allowed">
<div class="absolute top-2 right-2">
<span class="material-symbols-outlined text-gray-500 text-sm">lock</span>
</div>
<div class="w-16 h-16 rounded-full bg-gray-300 dark:bg-gray-700 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-4xl text-gray-500">nightlight</span>
</div>
<span class="text-sm font-bold text-center leading-tight text-gray-600 dark:text-gray-400">Night Owl</span>
</div>
</div>
</div>
<!-- Bottom padding for nav bar -->
<div class="h-8"></div>
</div>
<!-- Bottom Navigation Bar -->
<div class="absolute bottom-0 left-0 right-0 w-full bg-white dark:bg-gray-900 border-t-2 border-text-main shadow-[0_-4px_0_0_#2B2D42] z-50">
<div class="flex justify-around items-center h-20 px-2 pb-2">
<a class="flex flex-col items-center justify-center gap-1 w-16 text-gray-500 dark:text-gray-400 hover:text-text-main dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">home</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
</a>
<!-- Floating Action Button Style for Logger -->
<div class="relative -top-6">
<button class="w-16 h-16 rounded-full bg-primary border-thick shadow-block flex items-center justify-center text-white hover:bg-red-500 transition-colors">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</button>
</div>
<a class="flex flex-col items-center justify-center gap-1 w-16 text-text-main dark:text-white" href="#">
<span class="material-symbols-outlined text-[28px] text-primary" style="font-variation-settings: 'FILL' 1;">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Progress</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 w-16 text-gray-500 dark:text-gray-400 hover:text-text-main dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Profile</span>
</a>
</div>
</div>
</div>
</body></html>
